services:
  pli_reporta:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////data/pli_reporta.db
      - PHOTO_STORAGE_DIR=/data/photos
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8080}
      - SECRET_KEY=${SECRET_KEY:?defina}
      - MODERATOR_API_KEY=${MODERATOR_API_KEY:-}
    volumes:
      - pli_reporta_data:/data
    restart: unless-stopped

volumes:
  pli_reporta_data:
