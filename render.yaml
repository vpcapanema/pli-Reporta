services:
  - type: web
    name: pli-reporta
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PHOTO_STORAGE_DIR
        value: ./backend/storage/photos
      - key: SIGMA_POSTGRES_HOST
        sync: false
      - key: SIGMA_POSTGRES_PORT
        value: "5433"
      - key: SIGMA_POSTGRES_DATABASE
        sync: false
      - key: SIGMA_POSTGRES_USER
        sync: false
      - key: SIGMA_POSTGRES_PASSWORD
        sync: false
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 1
