services:
  - type: web
    name: pli-reporta
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python scripts/generate_icons.py
    startCommand: python scripts/db_migrate.py && python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PHOTO_STORAGE_DIR
        value: ./backend/storage/photos
      - key: SIGMA_POSTGRES_HOST
        sync: false
      - key: SIGMA_POSTGRES_PORT
        value: "5433"
      - key: SIGMA_POSTGRES_DATABASE
        sync: false
      - key: SIGMA_POSTGRES_USER
        sync: false
      - key: SIGMA_POSTGRES_PASSWORD
        sync: false
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 1
