# Configuração do Alembic — PLI Reporta.
# A URL do banco NÃO fica aqui: é lida de settings.database_url (env/.env)
# dentro de migrations/env.py, para manter uma única fonte de verdade.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# timezone para timestamps dos arquivos de versão
# timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
