<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#003b5a"/>
  <title>PLI Reporta — Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="public-page viewer-page">
  <header class="topbar">
    <h1>Mapa público</h1>
    <nav>
      <span class="viewer-count">
        Eventos: <span id="count-events">…</span> · Manifestações: <span id="count-manif">…</span>
      </span>
      <a href="/">Reportar</a>
      <a href="/mapa">Mapa</a>
      <a href="/acesso">Acesso Restrito</a>
    </nav>
  </header>
  <div class="map-toolbar">
    <label><input type="checkbox" id="layer-events" checked/> Eventos de tráfego</label>
    <label><input type="checkbox" id="layer-manif" checked/> Manifestações cidadãs</label>
  </div>
  <div id="viewer-map"></div>
  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
  <script type="module" src="/static/js/viewer.js"></script>
</body>
</html>
