<!doctype html>

<html lang="pt-BR">

<head>

  <meta charset="utf-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <meta name="theme-color" content="#155d31"/>

  <title>PLI Reporta — Mapa</title>

  <link rel="icon" href="/static/icons/icon-192.png"/>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css"/>

  <link rel="stylesheet" href="/static/styles.css"/>

</head>

<body class="viewer-page public-shell-page">

  <aside class="public-sidebar" id="public-sidebar" aria-label="Painel do mapa">

    <div class="sidebar-brand public-brand">
      <div class="sidebar-brand-head">
        <span class="sidebar-brand-mark" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" focusable="false"><path fill="currentColor" d="M12 0C6.48 0 2 4.48 2 10c0 7 10 18 10 18s10-11 10-18C22 4.48 17.52 0 12 0zm0 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg></span>
        <div class="sidebar-brand-titles">
          <span class="sidebar-brand-pli">PLI</span>
          <span class="sidebar-brand-reporta">Reporta</span>
        </div>
      </div>
      <span class="sidebar-brand-sub muted">Mapa público</span>
    </div>

    <div class="public-sidebar-scroll">

      <section class="public-sidebar-block public-sidebar-block-collapsible" id="panel-mapa" aria-label="Mapa público">

        <button type="button" class="public-nav-item public-nav-item-toggle active" id="btn-mapa-toggle" aria-expanded="true" aria-controls="mapa-body" aria-current="page">

          <span class="public-nav-icon" aria-hidden="true">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>

          </span>

          <span class="public-nav-item-label">Mapa público</span>

          <span class="public-nav-toggle" aria-hidden="true">▼</span>

        </button>

        <div class="public-sidebar-block-body" id="mapa-body">

          <p class="public-sidebar-subheading">Camadas do mapa</p>

          <div id="viewer-layers"></div>

        </div>

      </section>

      <section class="public-sidebar-block" aria-label="API pública">

        <a class="public-nav-item" href="/api-publica">

          <span class="public-nav-icon" aria-hidden="true">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>

          </span>

          <span>API pública</span>

        </a>

      </section>

      <section class="public-sidebar-block" aria-label="Reportar">

        <a class="public-nav-item" href="/">

          <span class="public-nav-icon" aria-hidden="true">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>

          </span>

          <span>Reportar</span>

        </a>

      </section>

      <section class="public-sidebar-block public-sidebar-block-collapsible collapsed" id="panel-relatorios" aria-label="Relatórios">

        <button type="button" class="public-nav-item public-nav-item-toggle" id="btn-relatorios-toggle" aria-expanded="false" aria-controls="relatorios-body">

          <span class="public-nav-icon" aria-hidden="true">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

          </span>

          <span class="public-nav-item-label">Relatórios</span>

          <span class="public-nav-toggle" aria-hidden="true">▼</span>

        </button>

        <div class="public-sidebar-block-body" id="relatorios-body" hidden>

          <div id="viewer-exports"></div>

        </div>

      </section>

    </div>

    <footer class="public-sidebar-foot">
      <p class="sidebar-credit">Desenvolvido e implementado por<br>VPC-Geotecnologias e Websistemas.<br>Desenvolvido para o PLI/SP-2050</p>
    </footer>

  </aside>

  <main class="viewer-main">

    <header class="pli-app-header">

      <div class="pli-app-header-left">

        <button type="button" class="pli-sidebar-toggle" id="toggle-sidebar" aria-label="Recolher menu lateral" title="Recolher menu">«</button>

      </div>

      <h2 class="pli-app-header-title">PLI — REPORTA</h2>

      <div class="pli-app-header-right">

        <a href="/acesso" class="pli-app-header-access" title="Área restrita para gestores">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

          Acesso Restrito

        </a>

      </div>

    </header>

    <section class="gestao-panel gestao-map-panel gestao-map-full">

      <div id="viewer-map"></div>

      <aside id="viewer-legend" class="gestao-legend viewer-legend" aria-label="Legenda de status"></aside>

    </section>

  </main>

  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>

  <script type="module" src="/static/js/viewer.js"></script>

</body>

</html>
