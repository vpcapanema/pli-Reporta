<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#003b5a"/>
  <title>PLI Reporta — Acesso Restrito</title>
  <link rel="icon" href="/static/icons/icon-192.png"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="access-page">
  <header class="topbar">
    <h1>Acesso Restrito</h1>
    <nav>
      <span id="mod-user" class="muted" style="margin-right:14px" hidden></span>
      <a href="/">Reportar</a>
      <a href="/mapa">Mapa público</a>
      <a href="/api-publica">API pública</a>
      <a href="/acesso" aria-current="page">Acesso Restrito</a>
    </nav>
  </header>
  <main class="access-main">
    <div class="access-login-wrapper">
      <section id="login-panel" class="access-login-card">
        <div class="access-branding">
          <img
            src="/static/icons/icon-192.png"
            alt=""
            class="access-app-icon"
            width="64"
            height="64"
          />
          <h2 class="access-app-title">PLI REPORTA</h2>
          <p class="access-app-subtitle">Login integrado SIGMA-PLI</p>
        </div>

        <form id="login-form" novalidate>
          <div class="access-field">
            <label class="access-field-label" for="login-user" id="login-user-label">Usuário</label>
            <div class="access-input-wrap">
              <span class="access-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
              </span>
              <input
                id="login-user"
                type="text"
                placeholder="gestor.silva ou gestor.silva@orgao.gov.br"
                autocomplete="username"
                minlength="3"
                maxlength="255"
                required
                autofocus
              />
            </div>
          </div>

          <div class="access-field">
            <label class="access-field-label" for="login-pass" id="login-pass-label">Senha</label>
            <div class="access-input-wrap">
              <span class="access-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2zm-5 6.7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM10 8V6a2 2 0 1 1 4 0v2h-4z"/></svg>
              </span>
              <input
                id="login-pass"
                type="password"
                placeholder="Sua senha"
                autocomplete="current-password"
                minlength="6"
                maxlength="128"
                required
              />
              <button type="button" class="access-toggle-pw" id="login-toggle-pw" aria-label="Mostrar ou ocultar senha">
                <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 5C7 5 2.7 8.1 1 12c1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
              </button>
            </div>
          </div>

          <p id="login-error" class="access-feedback" hidden role="alert"></p>

          <button type="submit" class="access-btn-submit">Entrar</button>
        </form>

        <div class="access-forgot">
          <a id="link-recuperar-senha" href="#" target="_blank" rel="noopener noreferrer" hidden>Esqueceu a senha?</a>
        </div>

        <div class="access-divider" id="access-divider" hidden>
          <span></span>
          <span class="access-divider-text">ou</span>
          <span></span>
        </div>

        <a id="link-cadastro" href="#" target="_blank" rel="noopener noreferrer" class="access-btn-register" hidden>Criar Conta</a>
      </section>
    </div>
  </main>
  <script type="module" src="/static/js/access-login.js"></script>
</body>
</html>
